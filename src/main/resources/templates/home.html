<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Home</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>トップ画面</h1>
      <p class="muted">ログイン成功しました。</p>
      <a class="btn btn-primary" href="/flows">フロー一覧へ</a>
      <form method="post" action="/logout" style="display:inline-block; margin-left:8px;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button class="btn btn-secondary" type="submit">ログアウト</button>
      </form>
    </section>
  </main>
</body>
</html>
