<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>マイページ</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
<main class="page">
  <div class="top-bar">
    <div>
      <h1>マイページ</h1>
      <p class="muted">自分のアカウント情報を編集できます。</p>
    </div>
    <div style="display:flex; gap:8px;">
      <form method="post" action="/logout" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button class="btn btn-secondary" type="submit">ログアウト</button>
      </form>
      <a class="btn btn-secondary" th:href="@{/flows}">一覧へ戻る</a>
    </div>
  </div>

  <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

  <section class="card" style="margin-bottom:16px;">
    <p>ユーザー名: <b th:text="${user.username}">user</b></p>
    <p>表示名: <b th:text="${currentDisplayName}">表示名</b></p>
    <p>状態: <span class="badge" th:text="${user.enabled ? 'ENABLED' : 'DISABLED'}">ENABLED</span></p>
  </section>

  <section class="card" style="margin-bottom:16px;">
    <h2>表示名変更</h2>
    <form method="post" th:action="@{/users/me/display-name}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div class="row">
        <label>表示名（100文字以内）</label>
        <input type="text" name="displayName" required maxlength="100" th:value="${currentDisplayName}" />
      </div>
      <button class="btn btn-primary" type="submit">更新</button>
    </form>
  </section>

  <section class="card">
    <h2>パスワード変更</h2>
    <form method="post" th:action="@{/users/me/password}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div class="row">
        <label>現在のパスワード</label>
        <input type="password" name="currentPassword" required />
      </div>
      <div class="row">
        <label>新しいパスワード（8文字以上）</label>
        <input type="password" name="newPassword" required minlength="8" />
      </div>
      <button class="btn btn-primary" type="submit">更新</button>
    </form>
  </section>
</main>
</body>
</html>
