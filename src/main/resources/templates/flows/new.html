<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>フロー新規作成</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
<main class="page" style="max-width: 980px;">
  <div class="top-bar">
    <div>
      <h1>フロー新規作成</h1>
      <p class="muted">参加者を検索して追加し、ステップごとの予約制約を設定してください。</p>
    </div>
    <div style="display:flex; gap:8px;">
      <form method="post" action="/logout" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button class="btn btn-secondary" type="submit">ログアウト</button>
      </form>
      <a class="btn btn-secondary" href="/flows">一覧へ戻る</a>
    </div>
  </div>

  <section class="card">
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <form id="createFlowForm" method="post" action="/flows">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <input type="hidden" name="durationMinutes" value="60" />
      <input type="hidden" name="startDate" th:value="${minDate}" />
      <input type="hidden" name="startTime" value="00:00" />

      <div class="row">
        <label>タイトル</label>
        <input type="text" name="title" required>
      </div>

      <div class="row">
        <label>参加者を追加（氏名入力で候補表示）</label>
        <input id="participantSearchInput" type="text" placeholder="例: Aさん" style="max-width:320px;" />
        <small class="muted">同じ参加者を複数回追加できます。</small>
        <div id="participantSelectableList" class="participant-list" style="margin-top:8px;"></div>
        <div id="participantNoMatch" class="muted" style="display:none; margin-top:8px;">一致する参加者がいません。</div>
      </div>

      <div class="row">
        <label>ステップ一覧（制約設定）</label>
        <div id="stepOrderList" class="participant-list"></div>
        <div id="stepOrderEmpty" class="muted">まだ参加者が追加されていません。</div>
        <div id="participantHiddenInputs"></div>
      </div>

      <button class="btn btn-primary" type="submit">作成する</button>
    </form>
  </section>
</main>

<script th:inline="javascript">
  (function () {
    const participants = /*[[${userParticipants}]]*/ [];
    const minDate = /*[[${minDate}]]*/ '';
    const normalizedParticipants = participants.map((p) => ({
      id: p.id,
      displayName: (p.displayName || '').trim(),
      searchKey: (p.displayName || '').trim().toLowerCase()
    }));

    const form = document.getElementById('createFlowForm');
    const searchInput = document.getElementById('participantSearchInput');
    const selectableList = document.getElementById('participantSelectableList');
    const noMatch = document.getElementById('participantNoMatch');
    const stepOrderList = document.getElementById('stepOrderList');
    const emptyLabel = document.getElementById('stepOrderEmpty');
    const hiddenInputs = document.getElementById('participantHiddenInputs');
    if (!form || !searchInput || !selectableList || !noMatch || !stepOrderList || !emptyLabel || !hiddenInputs) {
      return;
    }

    const selectedSteps = [];
    const weekdays = [
      { bit: 1, label: '日' },
      { bit: 2, label: '月' },
      { bit: 4, label: '火' },
      { bit: 8, label: '水' },
      { bit: 16, label: '木' },
      { bit: 32, label: '金' },
      { bit: 64, label: '土' }
    ];

    function maskToCheckedDays(mask) {
      const value = Number.isFinite(Number(mask)) ? Number(mask) : 127;
      return weekdays.filter((d) => (value & d.bit) !== 0).map((d) => d.bit);
    }

    function checkedDaysToMask(bits) {
      return bits.reduce((acc, bit) => acc | bit, 0);
    }

    function appendHidden(name, value) {
      const hidden = document.createElement('input');
      hidden.type = 'hidden';
      hidden.name = name;
      hidden.value = String(value ?? '');
      hiddenInputs.appendChild(hidden);
    }

    function syncHiddenInputs() {
      hiddenInputs.innerHTML = '';
      selectedSteps.forEach((step) => {
        appendHidden('participantUserIds', step.id);
        appendHidden('stepParticipantIds', step.id);
        appendHidden('stepReservableFromDates', step.fromDate || '');
        appendHidden('stepReservableToDates', step.toDate || '');
        appendHidden('stepAllowedWeekdayMasks', step.weekdayMask == null ? 127 : step.weekdayMask);
        appendHidden('stepAllowedStartMinutes', step.startMinute == null ? 0 : step.startMinute);
        appendHidden('stepAllowedEndMinutes', step.endMinute == null ? 1440 : step.endMinute);
      });
    }

    function render() {
      stepOrderList.innerHTML = '';
      emptyLabel.style.display = selectedSteps.length === 0 ? 'block' : 'none';

      selectedSteps.forEach((step, idx) => {
        const card = document.createElement('div');
        card.className = 'participant-option';
        card.style.display = 'block';
        card.style.padding = '10px';
        card.style.marginBottom = '8px';

        const header = document.createElement('div');
        header.style.display = 'flex';
        header.style.alignItems = 'center';
        header.style.gap = '8px';
        header.style.marginBottom = '8px';
        header.innerHTML = '<b>#' + (idx + 1) + '</b> <span>' + step.displayName + '</span>';

        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'btn btn-secondary';
        removeBtn.textContent = '削除';
        removeBtn.addEventListener('click', function () {
          selectedSteps.splice(idx, 1);
          render();
        });
        header.appendChild(removeBtn);
        card.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'grid-2';
        grid.innerHTML =
          '<div class="row"><label>予約可能開始日</label><input type="date" data-key="fromDate" /></div>' +
          '<div class="row"><label>予約可能終了日</label><input type="date" data-key="toDate" /></div>' +
          '<div class="row"><label>予約曜日</label><div data-weekday-wrap style="display:flex; gap:8px; flex-wrap:wrap;"></div></div>' +
          '<div class="row"><label>開始分(0-1439)</label><input type="number" min="0" max="1439" data-key="startMinute" /></div>' +
          '<div class="row"><label>終了分(1-1440)</label><input type="number" min="1" max="1440" data-key="endMinute" /></div>';
        card.appendChild(grid);

        grid.querySelectorAll('input[type="date"]').forEach((input) => {
          input.setAttribute('min', minDate);
        });
        grid.querySelectorAll('input[data-key]').forEach((input) => {
          const key = input.getAttribute('data-key');
          input.value = step[key] == null ? '' : String(step[key]);
          input.addEventListener('input', function () {
            if (key === 'startMinute' || key === 'endMinute') {
              step[key] = input.value === '' ? null : Number(input.value);
            } else {
              step[key] = input.value;
            }
            syncHiddenInputs();
          });
        });

        const weekdayWrap = grid.querySelector('[data-weekday-wrap]');
        if (weekdayWrap) {
          const selectedBits = new Set(maskToCheckedDays(step.weekdayMask));
          weekdays.forEach((day) => {
            const label = document.createElement('label');
            label.style.display = 'inline-flex';
            label.style.alignItems = 'center';
            label.style.gap = '4px';
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.value = String(day.bit);
            checkbox.checked = selectedBits.has(day.bit);
            checkbox.addEventListener('change', function () {
              const checked = Array.from(weekdayWrap.querySelectorAll('input[type="checkbox"]:checked'))
                .map((el) => Number(el.value));
              step.weekdayMask = checkedDaysToMask(checked);
              syncHiddenInputs();
            });
            label.appendChild(checkbox);
            label.appendChild(document.createTextNode(day.label));
            weekdayWrap.appendChild(label);
          });
        }
        stepOrderList.appendChild(card);
      });
      syncHiddenInputs();
    }

    function addParticipant(participant) {
      const previous = selectedSteps.length > 0 ? selectedSteps[selectedSteps.length - 1] : null;
      selectedSteps.push({
        id: participant.id,
        displayName: participant.displayName,
        fromDate: previous ? previous.fromDate : '',
        toDate: previous ? previous.toDate : '',
        weekdayMask: previous ? previous.weekdayMask : 127,
        startMinute: previous ? previous.startMinute : 0,
        endMinute: previous ? previous.endMinute : 1440
      });
      render();
    }

    function renderSelectableList() {
      const keyword = (searchInput.value || '').trim().toLowerCase();
      const candidates = keyword
        ? normalizedParticipants.filter((p) => p.searchKey.startsWith(keyword))
        : normalizedParticipants;

      selectableList.innerHTML = '';
      noMatch.style.display = candidates.length === 0 ? 'block' : 'none';

      candidates.forEach((p) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'participant-option';
        btn.style.cursor = 'pointer';
        btn.textContent = p.displayName;
        btn.addEventListener('click', function () {
          addParticipant(p);
        });
        selectableList.appendChild(btn);
      });
    }

    searchInput.addEventListener('input', renderSelectableList);

    form.addEventListener('submit', function (event) {
      syncHiddenInputs();
      if (selectedSteps.length === 0) {
        event.preventDefault();
        alert('参加者を1つ以上追加してください。');
        return;
      }

      for (const step of selectedSteps) {
        const mask = Number(step.weekdayMask);
        const startMinute = Number(step.startMinute);
        const endMinute = Number(step.endMinute);
        if (!Number.isFinite(mask) || mask < 1 || mask > 127) {
          event.preventDefault();
          alert('予約曜日を1つ以上選択してください。');
          return;
        }
        if (!Number.isFinite(startMinute) || startMinute < 0 || startMinute > 1439) {
          event.preventDefault();
          alert('開始分は0-1439で入力してください。');
          return;
        }
        if (!Number.isFinite(endMinute) || endMinute < 1 || endMinute > 1440) {
          event.preventDefault();
          alert('終了分は1-1440で入力してください。');
          return;
        }
        if (startMinute >= endMinute) {
          event.preventDefault();
          alert('開始分は終了分より前にしてください。');
          return;
        }
        if (step.fromDate && step.toDate && step.fromDate > step.toDate) {
          event.preventDefault();
          alert('予約可能開始日は終了日以前にしてください。');
          return;
        }
      }
    });

    renderSelectableList();
  })();
</script>
</body>
</html>
