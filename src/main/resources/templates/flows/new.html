<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>フロー新規作成</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
<main class="page" style="max-width: 980px;">
  <div class="top-bar">
    <div>
      <h1>フロー新規作成</h1>
      <p class="muted">氏名で候補を検索し、ステップ順に参加者を追加してください。</p>
    </div>
    <div style="display:flex; gap:8px;">
      <form method="post" action="/logout" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button class="btn btn-secondary" type="submit">ログアウト</button>
      </form>
      <a class="btn btn-secondary" href="/flows">一覧へ戻る</a>
    </div>
  </div>

  <section class="card">
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <form id="createFlowForm" method="post" action="/flows">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <input type="hidden" name="durationMinutes" value="60" />
      <input type="hidden" name="startDate" th:value="${minDate}" />
      <input type="hidden" name="startTime" value="00:00" />

      <div class="row">
        <label>タイトル</label>
        <input type="text" name="title" required>
      </div>

      <div class="row">
        <label>参加者を追加（前方一致検索）</label>
        <input id="participantSearchInput"
               type="text"
               placeholder="例: Aさん"
               style="max-width:320px;" />
        <small class="muted">同じ参加者を複数回追加できます（例: A→B→A→B）。</small>
        <div id="participantSelectableList" class="participant-list" style="margin-top:8px;"></div>
        <div id="participantNoMatch" class="muted" style="display:none; margin-top:8px;">一致する参加者がいません。</div>
      </div>

      <div class="row">
        <label>ステップ順</label>
        <div id="stepOrderList" class="participant-list"></div>
        <div id="stepOrderEmpty" class="muted">まだ参加者が追加されていません。</div>
        <div id="participantHiddenInputs"></div>
      </div>

      <button class="btn btn-primary" type="submit">作成する</button>
    </form>
  </section>
</main>

<script th:inline="javascript">
  (function () {
    const participants = /*[[${userParticipants}]]*/ [];
    const normalizedParticipants = participants.map((p) => ({
      id: p.id,
      displayName: (p.displayName || '').trim(),
      searchKey: (p.displayName || '').trim().toLowerCase()
    }));

    const form = document.getElementById('createFlowForm');
    const searchInput = document.getElementById('participantSearchInput');
    const selectableList = document.getElementById('participantSelectableList');
    const noMatch = document.getElementById('participantNoMatch');
    const stepOrderList = document.getElementById('stepOrderList');
    const emptyLabel = document.getElementById('stepOrderEmpty');
    const hiddenInputs = document.getElementById('participantHiddenInputs');
    if (!form || !searchInput || !selectableList || !noMatch || !stepOrderList || !emptyLabel || !hiddenInputs) {
      return;
    }

    const selectedSteps = [];

    function render() {
      stepOrderList.innerHTML = '';
      hiddenInputs.innerHTML = '';
      emptyLabel.style.display = selectedSteps.length === 0 ? 'block' : 'none';

      selectedSteps.forEach((step, idx) => {
        const chip = document.createElement('div');
        chip.className = 'participant-option';
        chip.style.display = 'inline-flex';
        chip.style.alignItems = 'center';
        chip.style.gap = '8px';
        chip.innerHTML = '<b>#' + (idx + 1) + '</b> <span>' + step.displayName + '</span>';

        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'btn btn-secondary';
        removeBtn.textContent = '削除';
        removeBtn.addEventListener('click', function () {
          selectedSteps.splice(idx, 1);
          render();
        });
        chip.appendChild(removeBtn);
        stepOrderList.appendChild(chip);

        const hidden = document.createElement('input');
        hidden.type = 'hidden';
        hidden.name = 'participantUserIds';
        hidden.value = String(step.id);
        hiddenInputs.appendChild(hidden);
      });
    }

    function addParticipant(participant) {
      selectedSteps.push({ id: participant.id, displayName: participant.displayName });
      render();
    }

    function renderSelectableList() {
      const keyword = (searchInput.value || '').trim().toLowerCase();
      const candidates = keyword
        ? normalizedParticipants.filter((p) => p.searchKey.startsWith(keyword))
        : normalizedParticipants;

      selectableList.innerHTML = '';
      noMatch.style.display = candidates.length === 0 ? 'block' : 'none';

      candidates.forEach((p) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'participant-option';
        btn.style.cursor = 'pointer';
        btn.textContent = p.displayName;
        btn.addEventListener('click', function () {
          addParticipant(p);
        });
        selectableList.appendChild(btn);
      });
    }

    searchInput.addEventListener('input', renderSelectableList);

    form.addEventListener('submit', function (event) {
      if (selectedSteps.length === 0) {
        event.preventDefault();
        alert('参加者を1つ以上追加してください。');
      }
    });

    renderSelectableList();
  })();
</script>
</body>
</html>
