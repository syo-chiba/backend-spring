<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>繝輔Ο繝ｼ菴懈・</title>
    <link rel="stylesheet" href="/app.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
<main class="page" style="max-width: 760px;">
    <div class="top-bar">
        <div>
            <h1>繝輔Ο繝ｼ菴懈・</h1>
            <p class="muted">邂｡逅・・∪縺溘・繝ｦ繝ｼ繧ｶ繝ｼ縺ｨ縺励※譁ｰ縺励＞繝輔Ο繝ｼ繧剃ｽ懈・縺励∪縺吶・/p>
        </div>
        <a class="btn btn-secondary" href="/flows">荳隕ｧ縺ｸ謌ｻ繧・/a>
    </div>

    <section class="card">
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <p>
            莠育ｴ・庄閭ｽ譛滄俣: <b th:text="${minDate}">2026-03-09</b> 縲・<b th:text="${maxDate}">2026-06-09</b>
        </p>

        <form id="createFlowForm" method="post" action="/flows">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="row">
                <label>繧ｿ繧､繝医Ν</label>
                <input type="text" name="title" required>
            </div>

            <div class="grid-2">
                <div class="row">
                    <label>謇隕∵凾髢難ｼ亥・・・/label>
                    <input type="number" name="durationMinutes" value="60" min="1" required>
                </div>

                <div class="row">
                    <label>隱ｿ謨ｴ髢句ｧ区律譎・/label>
                    <input id="startFromPicker" type="text" name="startFrom" required placeholder="YYYY-MM-DDTHH:mm">
                </div>
            </div>

            <div class="row">
                <label>諡・ｽ薙Θ繝ｼ繧ｶ繝ｼ・亥ｿ・茨ｼ・/label>
                <div th:if="${#lists.isEmpty(userParticipants)}" class="muted">
                    諡・ｽ薙Θ繝ｼ繧ｶ繝ｼ縺後＞縺ｾ縺帙ｓ縲ょ・縺ｫ邂｡逅・・判髱｢縺ｧ諡・ｽ薙Θ繝ｼ繧ｶ繝ｼ繧剃ｽ懈・縺励※縺上□縺輔＞縲・                </div>
                <div th:unless="${#lists.isEmpty(userParticipants)}" class="participant-list">
                    <label th:each="p : ${userParticipants}" class="participant-option">
                        <input type="checkbox" name="participantUserIds" th:value="${p.id}" />
                        <span th:text="${p.displayName}">user</span>
                    </label>
                </div>
            </div>

            <div class="row">
                <label>螟夜Κ蜿ょ刈閠・ｼ井ｻｻ諢上・1陦・蜷搾ｼ・/label>
                <textarea name="externalParticipants" rows="4" placeholder="A縺輔ｓ&#10;B縺輔ｓ"></textarea>
            </div>

            <button class="btn btn-primary" type="submit">菴懈・縺吶ｋ</button>
        </form>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script th:inline="javascript">
    const minDate = /*[[${minDate}]]*/ '2026-03-09';
    const maxDate = /*[[${maxDate}]]*/ '2026-06-09';

    flatpickr('#startFromPicker', {
        enableTime: true,
        dateFormat: "Y-m-d\\TH:i",
        minDate: minDate,
        maxDate: maxDate,
        defaultDate: minDate
    });

    const createFlowForm = document.getElementById('createFlowForm');
    if (createFlowForm) {
        createFlowForm.addEventListener('submit', function (event) {
            const checked = createFlowForm.querySelectorAll('input[name="participantUserIds"]:checked').length;
            if (checked === 0) {
                event.preventDefault();
                alert('諡・ｽ薙Θ繝ｼ繧ｶ繝ｼ繧・蜷堺ｻ･荳企∈謚槭＠縺ｦ縺上□縺輔＞縲・);
            }
        });
    }
</script>

</body>
</html>
