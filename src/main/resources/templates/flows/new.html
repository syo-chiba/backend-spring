<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>フロー作成</title>
    <link rel="stylesheet" href="/app.css">
</head>
<body>
<main class="page" style="max-width: 760px;">
    <div class="top-bar">
        <div>
            <h1>フロー作成</h1>
            <p class="muted">候補日時・参加ユーザーを指定して新しいフローを作成します。</p>
        </div>
        <div style="display:flex; gap:8px;">
            <form method="post" action="/logout" style="margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button class="btn btn-secondary" type="submit">ログアウト</button>
            </form>
            <a class="btn btn-secondary" href="/flows">一覧へ戻る</a>
        </div>
    </div>

    <section class="card" style="margin-bottom:16px;" th:if="${!#lists.isEmpty(availableTemplates)}">
        <h2>テンプレートから作成</h2>
        <p class="muted">よく使う定型フローからすぐに起票できます。</p>
        <table>
            <tr>
                <th>テンプレート名</th>
                <th>所要時間</th>
                <th>公開範囲</th>
                <th>操作</th>
            </tr>
            <tr th:each="t : ${availableTemplates}">
                <td th:text="${t.name}">テンプレート名</td>
                <td><span th:text="${t.durationMinutes}">60</span> 分</td>
                <td th:text="${t.visibility}">PRIVATE</td>
                <td>
                    <form method="post" action="/flows/from-template" style="display:flex; gap:8px; align-items:center;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" name="templateId" th:value="${t.id}" />
                        <input type="text" name="title" placeholder="タイトル上書き（任意）" />
                        <button class="btn btn-secondary" type="submit">このテンプレートで作成</button>
                    </form>
                </td>
            </tr>
        </table>
    </section>

    <section class="card">
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        <p>
            設定可能日時: <b th:text="${minDate}">2026-03-09</b> 〜 <b th:text="${maxDate}">2026-06-09</b>
        </p>

        <form id="createFlowForm" method="post" action="/flows">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="row">
                <label>タイトル</label>
                <input type="text" name="title" required>
            </div>

            <div class="row">
                <label>所要時間（分）</label>
                <input type="number" name="durationMinutes" value="60" min="1" required>
            </div>

            <div class="row">
                <label>調整開始日時</label>
                <input type="text" th:value="${minDate} + 'T00:00'" readonly disabled>
                <small class="muted">調整開始日時はシステムで固定されます。</small>
            </div>

            <div class="row">
                <label>参加ユーザー（複数選択）</label>
                <div th:if="${#lists.isEmpty(userParticipants)}" class="muted">
                    参加ユーザーがいません。先に参加者画面で参加ユーザーを作成してください。
                </div>
                <div th:unless="${#lists.isEmpty(userParticipants)}" class="participant-list">
                    <label th:each="p : ${userParticipants}" class="participant-option">
                        <input type="checkbox" name="participantUserIds" th:value="${p.id}" />
                        <span th:text="${p.displayName}">user</span>
                    </label>
                </div>
            </div>

            <div class="row">
                <label>外部参加者（任意、1行1名）</label>
                <textarea name="externalParticipants" rows="4" placeholder="Aさん&#10;Bさん"></textarea>
            </div>

            <button class="btn btn-primary" type="submit">作成する</button>
        </form>
    </section>
</main>

<script th:inline="javascript">
    const createFlowForm = document.getElementById('createFlowForm');
    if (createFlowForm) {
        createFlowForm.addEventListener('submit', function (event) {
            const checked = createFlowForm.querySelectorAll('input[name="participantUserIds"]:checked').length;
            if (checked === 0) {
                event.preventDefault();
                alert('参加ユーザーを1人以上選択してください。');
            }
        });
    }
</script>

</body>
</html>
