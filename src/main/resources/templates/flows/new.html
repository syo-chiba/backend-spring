<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>フロー新規作成</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
<main class="page" style="max-width: 980px;">
  <div class="top-bar">
    <div>
      <h1>フロー新規作成</h1>
      <p class="muted">氏名で候補を検索し、ステップ順に参加者を追加してください。</p>
    </div>
    <div style="display:flex; gap:8px;">
      <form method="post" action="/logout" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button class="btn btn-secondary" type="submit">ログアウト</button>
      </form>
      <a class="btn btn-secondary" href="/flows">一覧へ戻る</a>
    </div>
  </div>

  <section class="card">
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <form id="createFlowForm" method="post" action="/flows">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <input type="hidden" name="durationMinutes" value="60" />
      <input type="hidden" name="startDate" th:value="${minDate}" />
      <input type="hidden" name="startTime" value="00:00" />

      <div class="row">
        <label>タイトル</label>
        <input type="text" name="title" required>
      </div>

      <div class="row">
        <label>参加者を追加（氏名入力）</label>
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
          <input id="participantSearchInput"
                 type="text"
                 list="participantCandidates"
                 placeholder="例: Aさん"
                 style="min-width:260px;" />
          <button id="addParticipantStepButton" class="btn btn-secondary" type="button">ステップに追加</button>
        </div>
        <datalist id="participantCandidates">
          <option th:each="p : ${userParticipants}"
                  th:value="${p.displayName}"
                  th:attr="data-id=${p.id}">候補</option>
        </datalist>
        <small class="muted">同じ参加者を複数回追加できます（例: A→B→A→B）。</small>
      </div>

      <div class="row">
        <label>ステップ順</label>
        <div id="stepOrderList" class="participant-list"></div>
        <div id="stepOrderEmpty" class="muted">まだ参加者が追加されていません。</div>
        <div id="participantHiddenInputs"></div>
      </div>

      <button class="btn btn-primary" type="submit">作成する</button>
    </form>
  </section>
</main>

<script th:inline="javascript">
  (function () {
    const participants = /*[[${userParticipants}]]*/ [];
    const byName = new Map();
    participants.forEach((p) => byName.set((p.displayName || '').trim(), p));

    const form = document.getElementById('createFlowForm');
    const searchInput = document.getElementById('participantSearchInput');
    const addButton = document.getElementById('addParticipantStepButton');
    const stepOrderList = document.getElementById('stepOrderList');
    const emptyLabel = document.getElementById('stepOrderEmpty');
    const hiddenInputs = document.getElementById('participantHiddenInputs');
    if (!form || !searchInput || !addButton || !stepOrderList || !emptyLabel || !hiddenInputs) {
      return;
    }

    const selectedSteps = [];

    function render() {
      stepOrderList.innerHTML = '';
      hiddenInputs.innerHTML = '';
      emptyLabel.style.display = selectedSteps.length === 0 ? 'block' : 'none';

      selectedSteps.forEach((step, idx) => {
        const chip = document.createElement('div');
        chip.className = 'participant-option';
        chip.style.display = 'inline-flex';
        chip.style.alignItems = 'center';
        chip.style.gap = '8px';
        chip.innerHTML = '<b>#' + (idx + 1) + '</b> <span>' + step.displayName + '</span>';

        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'btn btn-secondary';
        removeBtn.textContent = '削除';
        removeBtn.addEventListener('click', function () {
          selectedSteps.splice(idx, 1);
          render();
        });
        chip.appendChild(removeBtn);
        stepOrderList.appendChild(chip);

        const hidden = document.createElement('input');
        hidden.type = 'hidden';
        hidden.name = 'participantUserIds';
        hidden.value = String(step.id);
        hiddenInputs.appendChild(hidden);
      });
    }

    function addCurrentInput() {
      const name = (searchInput.value || '').trim();
      if (!name) {
        return;
      }
      const participant = byName.get(name);
      if (!participant) {
        alert('候補一覧にある氏名を選択してください。');
        return;
      }
      selectedSteps.push({ id: participant.id, displayName: participant.displayName });
      searchInput.value = '';
      render();
    }

    addButton.addEventListener('click', addCurrentInput);
    searchInput.addEventListener('keydown', function (event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        addCurrentInput();
      }
    });

    form.addEventListener('submit', function (event) {
      if (selectedSteps.length === 0) {
        event.preventDefault();
        alert('参加者を1つ以上追加してください。');
      }
    });
  })();
</script>
</body>
</html>
