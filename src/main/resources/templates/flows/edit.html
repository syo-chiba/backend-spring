<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>フロー編集</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
<main class="page">
  <div class="top-bar">
    <div>
      <h1>フロー編集</h1>
      <p class="muted" th:text="'ID: ' + ${flow.id}">ID: 1</p>
    </div>
    <div style="display:flex; gap:8px;">
      <form method="post" action="/logout" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button class="btn btn-secondary" type="submit">ログアウト</button>
      </form>
      <a class="btn btn-secondary" th:href="@{'/flows/' + ${flow.id}}">詳細へ戻る</a>
    </div>
  </div>

  <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

  <section class="card" style="margin-bottom:16px;">
    <form method="post" th:action="@{'/flows/' + ${flow.id} + '/edit'}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div class="row">
        <label>タイトル</label>
        <input name="title" required th:value="${flow.title}" />
      </div>
      <div class="row">
        <label>所要時間（分）</label>
        <input type="number" min="1" max="720" name="durationMinutes" required th:value="${flow.durationMinutes}" />
      </div>
      <div class="row">
        <label>調整開始日時</label>
        <input type="text"
               th:value="${#temporals.format(flow.startFrom, 'yyyy-MM-dd''T''HH:mm')}"
               readonly disabled />
        <small class="muted">調整開始日時は作成時に固定され、編集できません。</small>
      </div>
      <button class="btn btn-primary" type="submit">基本情報を更新</button>
    </form>
  </section>

  <section class="card">
    <h2>参加ユーザー割り当て</h2>
    <p class="muted">既存ステップの担当ユーザーを画面から変更できます。</p>

    <div th:if="${#lists.isEmpty(userParticipants)}" class="muted">
      参加ユーザー候補がありません。先に参加者画面で参加ユーザーを作成してください。
    </div>

    <table th:if="${!#lists.isEmpty(steps)}">
      <tr>
        <th>順番</th>
        <th>現在の参加者</th>
        <th>状態</th>
        <th>面談設定日時</th>
        <th>操作</th>
      </tr>
      <tr th:each="step : ${steps}">
        <td th:text="${step.stepOrder}">1</td>
        <td th:text="${step.participantName}">参加者A</td>
        <td>
          <span class="badge" th:classappend="' badge-' + ${#strings.toLowerCase(step.status)}" th:text="${T(com.example.backend_spring.view.StatusLabelUtil).toJa(step.status)}">対応中</span>
        </td>
        <td>
          <form method="post"
                th:if="${step.confirmedStartAt != null}"
                th:action="@{'/flows/' + ${flow.id} + '/steps/' + ${step.id} + '/schedule'}"
                style="display:flex; gap:8px; align-items:center;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input class="stepSchedulePicker"
                   type="text"
                   name="startAt"
                   required
                   th:value="${#temporals.format(step.confirmedStartAt, 'yyyy-MM-dd''T''HH:mm')}"
                   placeholder="YYYY-MM-DDTHH:mm"
                   style="max-width:220px; margin-top:0;" />
            <button class="btn btn-secondary" type="submit">日時変更</button>
          </form>
          <span th:if="${step.confirmedStartAt == null}" class="muted">-</span>
        </td>
        <td>
          <form method="post" th:action="@{'/flows/' + ${flow.id} + '/steps/' + ${step.id} + '/assignee'}" style="display:flex; gap:8px; align-items:center;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <select name="participantId" required style="max-width:260px;">
              <option th:each="p : ${userParticipants}"
                      th:value="${p.id}"
                      th:selected="${p.id == step.participantId}"
                      th:text="${p.displayName}">user</option>
            </select>
            <button class="btn btn-secondary" type="submit">更新</button>
          </form>
        </td>
      </tr>
    </table>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script th:inline="javascript">
  const minDate = /*[[${minDate}]]*/ '2026-03-09';
  const maxDate = /*[[${maxDate}]]*/ '2026-06-09';
  document.querySelectorAll('.stepSchedulePicker').forEach(function (picker) {
    flatpickr(picker, {
      enableTime: true,
      dateFormat: "Y-m-d\\TH:i",
      minDate: minDate,
      maxDate: maxDate
    });
  });
</script>
</body>
</html>
