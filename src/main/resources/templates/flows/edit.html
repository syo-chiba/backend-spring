<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>フロー編集</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
<main class="page">
  <div class="top-bar">
    <div>
      <h1>フロー編集</h1>
      <p class="muted" th:text="'ID: ' + ${flow.id}">ID: 1</p>
    </div>
    <div style="display:flex; gap:8px;">
      <form method="post" action="/logout" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button class="btn btn-secondary" type="submit">ログアウト</button>
      </form>
      <a class="btn btn-secondary" th:href="@{'/flows/' + ${flow.id}}">詳細へ戻る</a>
    </div>
  </div>

  <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

  <section class="card" style="margin-bottom:16px;">
    <form method="post" th:action="@{'/flows/' + ${flow.id} + '/edit'}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div class="row">
        <label>タイトル</label>
        <input name="title" required th:value="${flow.title}" />
      </div>
      <div class="row">
        <label>所要時間（分）</label>
        <input type="number" min="1" max="720" name="durationMinutes" required th:value="${flow.durationMinutes}" />
      </div>
      <div class="row">
        <label>調整開始日時</label>
        <input type="text"
               th:value="${#temporals.format(flow.startFrom, 'yyyy-MM-dd''T''HH:mm')}"
               readonly disabled />
        <small class="muted">調整開始日時は作成時に固定され、編集できません。</small>
      </div>
      <button class="btn btn-primary" type="submit">基本情報を更新</button>
    </form>
  </section>

  <section class="card">
    <h2>参加ユーザー割り当て</h2>
    <p class="muted">既存ステップの担当ユーザーを画面から変更できます。</p>

    <div th:if="${#lists.isEmpty(userParticipants)}" class="muted">
      参加ユーザー候補がありません。先に参加者画面で参加ユーザーを作成してください。
    </div>

    <table th:if="${!#lists.isEmpty(steps)}">
      <tr>
        <th>順番</th>
        <th>現在の参加者</th>
        <th>状態</th>
        <th>面談設定日時</th>
        <th>操作</th>
      </tr>
      <tr th:each="step : ${steps}">
        <td th:text="${step.stepOrder}">1</td>
        <td th:text="${step.participantName}">参加者A</td>
        <td>
          <span class="badge" th:classappend="' badge-' + ${#strings.toLowerCase(step.status)}" th:text="${T(com.example.backend_spring.view.StatusLabelUtil).toJa(step.status)}">対応中</span>
        </td>
        <td>
          <div th:if="${step.confirmedStartAt != null}">
            <div>設定日付 <b th:text="${#temporals.format(step.confirmedStartAt, 'yyyy年M月d日')}">2026年3月10日</b></div>
            <div>設定時間 <b th:text="${#temporals.format(step.confirmedStartAt, 'H時mm分')} + '～'">10時30分～</b></div>
          </div>
          <span th:if="${step.confirmedStartAt == null}" class="muted">未設定</span>
        </td>
        <td>
          <form method="post" th:action="@{'/flows/' + ${flow.id} + '/steps/' + ${step.id} + '/finalize'}" style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <select name="participantId" required style="max-width:260px;">
              <option th:each="p : ${userParticipants}"
                      th:value="${p.id}"
                      th:selected="${p.id == step.participantId}"
                      th:text="${p.displayName}">user</option>
            </select>
            <input type="date"
                   name="startDate"
                   required
                   th:value="${step.confirmedStartAt != null ? #temporals.format(step.confirmedStartAt, 'yyyy-MM-dd') : minDate}"
                   th:attr="min=${minDate},max=${maxDate}"
                   style="max-width:170px; margin-top:0;" />
            <select name="startTime" required style="max-width:140px; margin-top:0;">
              <option th:each="i : ${#numbers.sequence(0,47)}"
                      th:value="${T(java.lang.String).format('%02d:%02d', i / 2, (i % 2) * 30)}"
                      th:selected="${step.confirmedStartAt != null ? #temporals.format(step.confirmedStartAt, 'HH:mm') == T(java.lang.String).format('%02d:%02d', i / 2, (i % 2) * 30) : i == 18}"
                      th:text="|${i / 2}時${(i % 2) == 0 ? '00' : '30'}分|">
                9時00分
              </option>
            </select>
            <button class="btn btn-secondary" type="submit">担当・日時を確定</button>
          </form>
        </td>
      </tr>
    </table>
  </section>
</main>
</body>
</html>
