<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>フロー編集</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
<main class="page">
  <div class="top-bar">
    <div>
      <h1>フロー編集</h1>
      <p class="muted" th:text="'ID: ' + ${flow.id}">ID: 1</p>
    </div>
    <div style="display:flex; gap:8px;">
      <form method="post" action="/logout" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button class="btn btn-secondary" type="submit">ログアウト</button>
      </form>
      <a class="btn btn-secondary" th:href="@{'/flows/' + ${flow.id}}">詳細へ戻る</a>
    </div>
  </div>

  <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

  <section class="card" style="margin-bottom:16px;">
    <form method="post" th:action="@{'/flows/' + ${flow.id} + '/edit'}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div class="row">
        <label>タイトル</label>
        <input id="editFlowTitleInput" name="title" required th:value="${flow.title}" />
      </div>
      <div class="row">
        <label>所要時間（分）</label>
        <input type="number" min="1" max="720" name="durationMinutes" required th:value="${flow.durationMinutes}" />
      </div>
      <div class="row">
        <label>調整開始日時</label>
        <input type="text" th:value="${#temporals.format(flow.startFrom, 'yyyy-MM-dd HH:mm')}" readonly disabled />
      </div>
      <button class="btn btn-primary" type="submit">基本情報を更新</button>
    </form>
  </section>

  <section class="card" style="margin-bottom:16px;">
    <div class="calendar-head">
      <div>
        <h2>関係者の予定（週）</h2>
        <p class="muted" th:text="${userWeekLabel}">2026/03/09 - 2026/03/15</p>
      </div>
      <div class="calendar-nav">
        <a class="btn btn-secondary" th:href="@{'/flows/' + ${flow.id} + '/edit'(calendarCursor=${userWeekPrevCursor})}">前へ</a>
        <a class="btn btn-secondary" th:href="@{'/flows/' + ${flow.id} + '/edit'(calendarCursor=${userWeekTodayCursor})}">今週</a>
        <a class="btn btn-secondary" th:href="@{'/flows/' + ${flow.id} + '/edit'(calendarCursor=${userWeekNextCursor})}">次へ</a>
      </div>
    </div>

    <div class="row" th:if="${!#lists.isEmpty(steps)}">
      <label>確定対象ステップ</label>
      <select id="calendarTargetStepId">
        <option th:each="s : ${steps}"
                th:value="${s.id}"
                th:attr="data-participant-id=${s.participantId}"
                th:text="|#${s.stepOrder} ${s.participantName}|">#1 Aさん</option>
      </select>
      <small class="muted">クリックした日時を選択ステップに対してそのまま確定します。</small>
    </div>

    <div class="calendar-grid">
      <div class="calendar-corner">時刻</div>
      <div class="calendar-day-head"
           th:each="day : ${userWeekCalendar.days}"
           th:classappend="${day.today} ? ' calendar-day-head-today' : ''"
           th:attr="data-date=${day.isoDate}"
           th:text="${day.label}">3/11(水)</div>

      <div class="calendar-time-col">
        <div class="calendar-time-label" th:each="hour : ${userWeekCalendar.hourLabels}">
          <span th:text="${hour}">0</span>:00
        </div>
      </div>

      <div class="calendar-day-col calendar-day-col-clickable"
           th:each="day : ${userWeekCalendar.days}"
           th:attr="data-date=${day.isoDate}">
        <a class="calendar-event"
           th:each="event : ${day.events}"
           th:classappend="' ' + ${event.typeClass}"
           th:style="${event.style}"
           th:attr="data-start=${event.startAtIso},data-end=${event.endAtIso}"
           th:title="${event.tooltip}"
           th:href="${event.detailUrl}">
          <div class="calendar-event-title" th:text="${event.title}">#20 k k / 千葉</div>
          <div class="calendar-event-time" th:text="${event.timeLabel}">09:30 - 10:30</div>
        </a>
      </div>
    </div>
    <p class="muted" style="margin-top:8px;">空き枠をクリックするとモーダルで確認後、そのまま確定します。赤プレビューは重複です。</p>
  </section>
</main>

<form id="calendarFinalizeForm" method="post" style="display:none;">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
  <input type="hidden" name="participantId" id="calendarFinalizeParticipantId" />
  <input type="hidden" name="startDate" id="calendarFinalizeStartDate" />
  <input type="hidden" name="startTime" id="calendarFinalizeStartTime" />
</form>

<div id="editSlotConfirmModal" class="slot-modal" aria-hidden="true">
  <div class="slot-modal-backdrop" data-close-edit-slot-modal></div>
  <div class="slot-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="editSlotConfirmTitle">
    <h3 id="editSlotConfirmTitle">この内容で確定しますか？</h3>
    <p id="editSlotConfirmMessage" class="muted">OKで確定します。</p>
    <div class="row">
      <label for="editSlotTitleInput">タイトル</label>
      <input id="editSlotTitleInput" type="text" />
    </div>
    <div class="grid-2">
      <div class="row">
        <label for="editSlotDateInput">日付</label>
        <input id="editSlotDateInput" type="date" th:attr="min=${minDate},max=${maxDate}" />
      </div>
      <div class="row">
        <label for="editSlotTimeSelect">時刻</label>
        <select id="editSlotTimeSelect">
          <option th:each="i : ${#numbers.sequence(0,47)}"
                  th:value="${T(java.lang.String).format('%02d:%02d', i / 2, (i % 2) * 30)}"
                  th:text="|${i / 2}時${(i % 2) == 0 ? '00' : '30'}分|">9時00分</option>
        </select>
      </div>
    </div>
    <div class="row">
      <label for="editSlotParticipantSelect">参加ユーザー</label>
      <select id="editSlotParticipantSelect">
        <option th:each="p : ${userParticipants}" th:value="${p.id}" th:text="${p.displayName}">user</option>
      </select>
    </div>
    <p id="editSlotConfirmError" class="alert alert-error" style="display:none; margin-top:8px; margin-bottom:0;"></p>
    <div class="slot-modal-actions">
      <button type="button" class="btn btn-secondary" data-close-edit-slot-modal>キャンセル</button>
      <button type="button" class="btn btn-primary" id="editSlotConfirmOk">OK</button>
    </div>
  </div>
</div>

<script th:inline="javascript">
  (function () {
    const flowId = /*[[${flow.id}]]*/ 0;
    const durationMinutes = Number(/*[[${flow.durationMinutes}]]*/ 60);
    const targetStepSelect = document.getElementById('calendarTargetStepId');
    const modal = document.getElementById('editSlotConfirmModal');
    const modalMessage = document.getElementById('editSlotConfirmMessage');
    const modalError = document.getElementById('editSlotConfirmError');
    const modalTitleInput = document.getElementById('editSlotTitleInput');
    const modalDateInput = document.getElementById('editSlotDateInput');
    const modalTimeSelect = document.getElementById('editSlotTimeSelect');
    const modalParticipantSelect = document.getElementById('editSlotParticipantSelect');
    const confirmOk = document.getElementById('editSlotConfirmOk');
    const flowTitleInput = document.getElementById('editFlowTitleInput');
    const finalizeForm = document.getElementById('calendarFinalizeForm');
    const finalizeParticipantId = document.getElementById('calendarFinalizeParticipantId');
    const finalizeStartDate = document.getElementById('calendarFinalizeStartDate');
    const finalizeStartTime = document.getElementById('calendarFinalizeStartTime');
    if (!targetStepSelect || !modal || !modalMessage || !modalError || !modalTitleInput || !modalDateInput || !modalTimeSelect || !modalParticipantSelect || !confirmOk || !flowTitleInput || !finalizeForm || !finalizeParticipantId || !finalizeStartDate || !finalizeStartTime) {
      return;
    }

    let pendingSelection = null;
    const occupiedByDate = {};

    function toTimeText(totalMinutes) {
      const normalized = ((totalMinutes % (24 * 60)) + (24 * 60)) % (24 * 60);
      const hour = Math.floor(normalized / 60);
      const minute = normalized % 60;
      return String(hour).padStart(2, '0') + ':' + String(minute).padStart(2, '0');
    }

    function parseIsoToMinutes(iso) {
      if (!iso || iso.length < 16) {
        return null;
      }
      const hour = Number(iso.slice(11, 13));
      const minute = Number(iso.slice(14, 16));
      if (Number.isNaN(hour) || Number.isNaN(minute)) {
        return null;
      }
      return hour * 60 + minute;
    }

    function computeSlotInfo(col, clientY) {
      const rect = col.getBoundingClientRect();
      const y = Math.max(0, Math.min(clientY - rect.top, rect.height));
      const minutesFromTop = (y / rect.height) * (24 * 60);
      const slotMinutes = Math.floor(minutesFromTop / 30) * 30;
      const topPx = (slotMinutes / (24 * 60)) * rect.height;
      const rawHeightPx = (Math.max(30, durationMinutes) / (24 * 60)) * rect.height;
      const heightPx = Math.max(14, rawHeightPx);
      const clampedTopPx = Math.min(topPx, Math.max(0, rect.height - heightPx));
      return {
        slotMinutes,
        topPx: clampedTopPx,
        heightPx,
        startTime: toTimeText(slotMinutes),
        endTime: toTimeText(slotMinutes + durationMinutes),
        endMinutes: slotMinutes + durationMinutes
      };
    }

    function ensurePreviewElement(col) {
      let preview = col.querySelector('.slot-hover-preview');
      if (!preview) {
        preview = document.createElement('div');
        preview.className = 'slot-hover-preview';
        col.appendChild(preview);
      }
      return preview;
    }

    function closeModal() {
      modal.setAttribute('aria-hidden', 'true');
      pendingSelection = null;
      confirmOk.disabled = false;
      modalError.style.display = 'none';
      modalError.textContent = '';
    }

    function computeOverlap(date, startTime) {
      const start = Number(startTime.slice(0, 2)) * 60 + Number(startTime.slice(3, 5));
      const end = start + durationMinutes;
      const ranges = occupiedByDate[date] || [];
      return ranges.some((r) => start < r.end && end > r.start);
    }

    function refreshModalValidation() {
      if (!pendingSelection) {
        return;
      }
      const date = modalDateInput.value;
      const time = modalTimeSelect.value;
      const overlap = computeOverlap(date, time);
      const endTime = toTimeText(Number(time.slice(0, 2)) * 60 + Number(time.slice(3, 5)) + durationMinutes);
      modalMessage.textContent = '#' + pendingSelection.stepId + ' を ' + date + ' ' + time + ' - ' + endTime + ' で確定します。よろしいですか？';
      if (overlap) {
        confirmOk.disabled = true;
        modalError.style.display = 'block';
        modalError.textContent = 'この時間帯は既存予定と重複しています。別の時間を選択してください。';
      } else {
        confirmOk.disabled = false;
        modalError.style.display = 'none';
        modalError.textContent = '';
      }
    }

    function openModal(stepId, date, slot, participantId) {
      pendingSelection = { stepId };
      modalTitleInput.value = flowTitleInput.value || '';
      modalDateInput.value = date;
      modalTimeSelect.value = slot.startTime;
      if (participantId && modalParticipantSelect.querySelector('option[value="' + participantId + '"]')) {
        modalParticipantSelect.value = participantId;
      }
      refreshModalValidation();
      modal.setAttribute('aria-hidden', 'false');
    }

    modal.querySelectorAll('[data-close-edit-slot-modal]').forEach((el) => {
      el.addEventListener('click', closeModal);
    });

    confirmOk.addEventListener('click', () => {
      if (!pendingSelection || confirmOk.disabled) {
        return;
      }
      flowTitleInput.value = modalTitleInput.value;
      finalizeForm.action = '/flows/' + flowId + '/steps/' + pendingSelection.stepId + '/finalize';
      finalizeParticipantId.value = modalParticipantSelect.value;
      finalizeStartDate.value = modalDateInput.value;
      finalizeStartTime.value = modalTimeSelect.value;
      closeModal();
      finalizeForm.submit();
    });

    modalDateInput.addEventListener('change', refreshModalValidation);
    modalTimeSelect.addEventListener('change', refreshModalValidation);

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && modal.getAttribute('aria-hidden') === 'false') {
        closeModal();
      }
    });

    const cols = document.querySelectorAll('.calendar-day-col-clickable[data-date]');
    cols.forEach((col) => {
      const date = col.getAttribute('data-date');
      const ranges = [];
      col.querySelectorAll('.calendar-event[data-start][data-end]').forEach((eventEl) => {
        const start = parseIsoToMinutes(eventEl.getAttribute('data-start'));
        const end = parseIsoToMinutes(eventEl.getAttribute('data-end'));
        if (start === null || end === null) {
          return;
        }
        ranges.push({ start, end });
      });
      occupiedByDate[date] = ranges;

      col.addEventListener('mousemove', (event) => {
        if (event.target.closest('.calendar-event')) {
          const existing = col.querySelector('.slot-hover-preview');
          if (existing) {
            existing.style.display = 'none';
          }
          return;
        }
        const slot = computeSlotInfo(col, event.clientY);
        const preview = ensurePreviewElement(col);
        const overlap = (occupiedByDate[date] || []).some((r) => slot.slotMinutes < r.end && slot.endMinutes > r.start);
        preview.style.display = 'block';
        preview.style.top = slot.topPx + 'px';
        preview.style.height = slot.heightPx + 'px';
        preview.textContent = slot.startTime + ' - ' + slot.endTime;
        preview.classList.toggle('slot-hover-preview-overlap', overlap);
      });

      col.addEventListener('mouseleave', () => {
        const existing = col.querySelector('.slot-hover-preview');
        if (existing) {
          existing.style.display = 'none';
        }
      });

      col.addEventListener('click', (event) => {
        if (event.target.closest('.calendar-event')) {
          return;
        }
        const selectedOption = targetStepSelect.options[targetStepSelect.selectedIndex];
        if (!selectedOption) {
          return;
        }
        const stepId = selectedOption.value;
        const participantId = selectedOption.getAttribute('data-participant-id');
        const slot = computeSlotInfo(col, event.clientY);
        openModal(stepId, date, slot, participantId);
      });
    });
  })();
</script>
</body>
</html>
