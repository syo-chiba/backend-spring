<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>ユーザー管理</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
<main class="page">
  <div class="top-bar">
    <div>
      <h1>ユーザー管理</h1>
      <p class="muted">管理者のみが操作できます。</p>
    </div>
    <a class="btn btn-secondary" th:href="@{/flows}">一覧へ戻る</a>
  </div>

  <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

  <section class="card">
    <h2 style="margin-top:0;">担当ユーザー作成</h2>
    <form method="post" th:action="@{/admin/users/create}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div class="row">
        <label>Username</label>
        <input name="username" required maxlength="50" />
      </div>
      <div class="row">
        <label>Password (8文字以上)</label>
        <input type="password" name="password" required minlength="8" />
      </div>
      <div class="row">
        <label>表示名（任意）</label>
        <input name="displayName" maxlength="100" />
      </div>
      <div class="row">
        <label><input type="checkbox" name="enabled" value="true" checked /> 有効化する</label>
      </div>
      <button class="btn btn-primary" type="submit">作成</button>
    </form>
  </section>

  <section class="card">
    <table>
      <tr>
        <th>ID</th>
        <th>ユーザー名</th>
        <th>有効</th>
        <th>ロール</th>
        <th>操作</th>
      </tr>
      <tr th:each="u : ${users}">
        <td th:text="${u.id}">1</td>
        <td th:text="${u.username}">admin</td>
        <td th:text="${u.enabled}">true</td>
        <td th:text="${#strings.listJoin(u.roles, ', ')}">ROLE_USER</td>
        <td>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <form method="post" th:action="@{'/admin/users/' + ${u.id} + '/enabled'}">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <input type="hidden" name="enabled" th:value="${!u.enabled}" />
              <button class="btn btn-secondary" type="submit" th:text="${u.enabled ? '無効化' : '有効化'}">無効化</button>
            </form>

            <form method="post" th:action="@{'/admin/users/' + ${u.id} + '/role'}">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <input type="hidden" name="role" value="ROLE_ADMIN" />
              <input type="hidden" name="action" value="grant" />
              <button class="btn btn-secondary" type="submit">管理者付与</button>
            </form>

            <form method="post" th:action="@{'/admin/users/' + ${u.id} + '/role'}">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <input type="hidden" name="role" value="ROLE_ADMIN" />
              <input type="hidden" name="action" value="revoke" />
              <button class="btn btn-secondary" type="submit">管理者解除</button>
            </form>

            <form method="post" th:action="@{'/admin/users/' + ${u.id} + '/delete'}" onsubmit="return confirm('削除しますか？');">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button class="btn btn-secondary" type="submit">削除</button>
            </form>
          </div>
        </td>
      </tr>
    </table>
  </section>
</main>
</body>
</html>
